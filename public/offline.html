<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — Viva La Mañana</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0b0f1a;
        color: #f2f4f8;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      .logo {
        width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px;
        background: linear-gradient(135deg, #f4813a, #9a4be3);
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { color: #aeb6c6; margin: 0 0 20px; }
      button {
        border: 0; border-radius: 12px; padding: 12px 20px; font-size: 1rem;
        background: #f4813a; color: #1a1000; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"></div>
      <h1>Estás sin conexión</h1>
      <p>No pudimos cargar la página. Revisá tu conexión e intentá de nuevo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
